<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizForge — Quiz</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- KaTeX (for rendering math in question text + options) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

  <!-- highlight.js (for code snippets) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- MathQuill (rich math editor for short answer input) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.min.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="css/tokens.css"/>
  <link rel="stylesheet" href="css/quiz.css"/>
</head>
<body class="quiz-page">

  <!-- ── HEADER ── -->
  <header class="quiz-header">
    <div class="quiz-header-left">
      <span class="quiz-header-logo">Quiz<span>Forge</span></span>
      <span class="quiz-header-title" id="qp-title">Loading…</span>
    </div>
    <div class="quiz-header-right">
      <!-- Timer -->
      <div class="timer-chip" id="timer-chip">
        ⏱ <span>--:--</span>
      </div>
      <span class="quiz-header-title" id="qp-meta" style="border-left:none;font-size:.72rem;color:var(--text3)"></span>
      <button class="theme-btn" id="qp-theme-btn" onclick="QuizPage.toggleTheme()">🌙</button>
      <a href="quiz_setting.html" class="btn btn-ghost" style="padding:6px 14px;font-size:.75rem;text-decoration:none">
        ← Dashboard
      </a>
    </div>
  </header>

  <!-- ── PROGRESS ── -->
  <div class="quiz-progress-wrap">
    <div class="prog-row">
      <span id="qp-prog-label">Question 1 of —</span>
      <b id="qp-prog-pct">0%</b>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="qp-prog-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- ── BODY ── -->
  <div class="quiz-body">

    <!-- Question panel -->
    <div class="q-panel" id="q-panel">
      <!-- injected by JS -->
    </div>

    <!-- Right nav sidebar -->
    <aside class="quiz-nav-sidebar">
      <div class="q-score-box" id="q-score-box" style="display:none">
        <div class="q-score-num"   id="q-score-num">—</div>
        <div class="q-score-label" id="q-score-label">—</div>
      </div>
      <div class="nav-sidebar-title">Questions</div>
      <div class="q-dot-list" id="q-dot-list"></div>
    </aside>

  </div>

  <!-- ── FOOTER ── -->
  <footer class="quiz-footer">
    <div class="footer-btns">
      <button class="btn btn-ghost"   id="qp-btn-prev"   onclick="QuizPage.navigate(-1)" disabled>← Prev</button>
      <button class="btn btn-primary" id="qp-btn-next"   onclick="QuizPage.navigate(1)">Next →</button>
      <button class="btn btn-success" id="qp-btn-submit" style="display:none" onclick="QuizPage.submit()">Submit ✓</button>
    </div>
    <span class="footer-hint" id="qp-footer-hint">Select an answer to continue</span>
  </footer>

  <!-- ── RESULTS OVERLAY ── -->
  <div class="results-overlay" id="results-overlay">
    <div class="results-card">
      <div class="results-score" id="res-score">—</div>
      <div class="results-label">Overall Score</div>
      <div class="results-stats">
        <div>
          <div class="result-stat-num" id="res-correct">—</div>
          <div class="result-stat-label">Correct</div>
        </div>
        <div>
          <div class="result-stat-num" id="res-wrong">—</div>
          <div class="result-stat-label">Wrong</div>
        </div>
        <div>
          <div class="result-stat-num" id="res-total">—</div>
          <div class="result-stat-label">Total</div>
        </div>
      </div>
      <div class="results-btns">
        <button class="btn btn-ghost"   onclick="QuizPage.reviewAnswers()">Review Answers</button>
        <button class="btn btn-primary" onclick="QuizPage.retry()">↩ Retry</button>
        <a href="quiz_setting.html" class="btn btn-ghost" style="text-decoration:none">← Dashboard</a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/mockData.js"></script>
  <script src="js/api.js"></script>
  <script src="js/quizPage.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Keyboard navigation
      document.addEventListener('keydown', e => {
        // Don't steal keys from MathQuill input
        const active = document.activeElement;
        if (active && active.closest('.mq-editable-field')) return;
        if (e.key === 'ArrowRight') QuizPage.navigate(1);
        if (e.key === 'ArrowLeft')  QuizPage.navigate(-1);
        if (e.key === 'Escape')     window.close();
      });

      QuizPage.init();
    });
  </script>
</body>
</html>
